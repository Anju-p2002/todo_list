<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update</title>
</head>
<body>
    <div class="box">
    <form action= 'updatetask/uprec/(taks_id)'  method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" value="{{ task.title }}">
        <label for="description">Description:</label>
        <input type="text" id="description" name="description" value="{{ task.description }}">
        <label for="due_date">Due Date:</label>
        <input type="date" id="due_date" name="due_date" value="{{ task.due_date }}">
        <label for="time">Time:</label>
        <input type="time" id="time" name="time" value="{{ task.time }}">
        <label for="category">Category:</label>
        <input type="category" id="category" name="category" value="{{ task.category}}">
        <label for="priority">Priority:</label>
        <input type="priority" id="priority" name="priority" value="{{ task.priority }}">
       <br>
        <button type="submit" class="btn btn-lg btn-success">Update</button>
    </form>
    </div>
</body>
</html>
