<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update</title>
</head>
<body>
    <form action="{% url 'updatetask' task.id %}" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" value="{{ task.title }}">
        <label for="description">Description:</label>
        <textarea id="description" name="description">{{ task.description }}</textarea>
        <label for="due_date">Due Date:</label>
        <input type="date" id="due_date" name="due_date" value="{{ task.due_date }}">
        <label for="time">Time:</label>
        <input type="time" id="time" name="time" value="{{ task.time }}">
        <label for="category">Category:</label>
        <select id="category" name="category">
            <option value="personal" {% if task.category="personal" %}selected{% endif %}>Personal</option>
            <option value="work" {% if task.category = "work" %}selected{% endif %}>Work</option>
            <option value="home" {% if task.category = "home" %}selected{% endif %}>Home</option>
            <option value="client" {% if task.category = "client" %}selected{% endif %}>Client</option>
        </select>
        <label for="priority">Priority:</label>
        <select id="priority" name="priority">
            <option value="low" {% if task.priority = "low" %}selected{% endif %}>Low</option>
            <option value="medium" {% if task.priority = "medium" %}selected{% endif %}>Medium</option>
            <option value="high" {% if task.priority = "high" %}selected{% endif %}>High</option>
        </select>
        <button type="submit" class="btn btn-lg btn-success">Update</button>
    </form>
</body>
</html>
