{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>profile</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f7fb;
        }

        .container {
            display: flex;
        }

        .sidebar {
            width: 220px;
            background: #fff;
            height: 100vh;
            padding: 20px;
        }

        .sidebar li {
            list-style: none;
            padding: 12px;
            margin: 10px 0;
        }

        .btn7 {

            background-color: #e4e5ea;
            color: black;
            font-size: 16px;
            padding: 15px 32px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            text-align: center;
            display: inline-block;
            width: 150px;

        }



        .btn7:hover {
            background-color: #a7c3db;
            color: white;
        }

        .btn6 {
            background-color: #e4e5ea;
            color: black;
            font-size: 16px;
            padding: 15px 32px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            text-align: center;
            display: inline-block;
            width: 150px;
        }

        .btn6:hover {
            background-color: #a7c3db;
            color: white;
        }

        .btn8 {
            background-color: #e4e5ea;
            color: black;
            font-size: 16px;
            padding: 15px 32px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            text-align: center;
            display: inline-block;
            width: 150px;
        }

        .btn8:hover {
            background-color: #a7c3db;
            color: white;
        }

        .btn1 {
            background: #165899;
            color: rgb(219, 223, 228);
            padding: 10px;
            border-radius: 10px;
            border: none;
            margin-top: 20px;

        }

        .form {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            width: 400px;
            margin: 50px auto;
            margin-bottom: 15px;

        }

        .img {
            display: block;
            margin: 0 auto 20px;
        }


        .form label {
            font-size: 14px;
            color: #555;
        }

        .form input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        .btn9 {
            background-color: #a7c3db;
            color: black;
            font-size: 16px;
            padding: 15px 32px;
            border: none;

            border-radius: 5px;

            display: inline-block;
            width: 150px;
        }
        .btn9:hover {

            color: white;
        }
        .btn2 {

            border: none;
            margin-top: 20px;

        }
    </style>
</head>

<body>
    <div class="container">
        <div class="sidebar">

            <h2>✔ Todo Web</h2>
            <div>
                <ul>
                    <li><a href="{% url 'profile' %}"><button class="btn9">Profile</button></a></li>

                    <li class=""><a href="{% url 'dashboard' %}"><button class="btn6">Overview</button></a></li>
                    <li><a href="{% url 'addtask' %}"><button class="btn7">Tasks</button></a></li>
                    <li><a href="{% url 'calendar' %}"><button class="btn8">Calendar</button></a></li>
                </ul>
            </div>
            <a href="{% url 'logout' %}">
            <button class="btn1">Logout</button>
</a>
        </div>

        <div class="form">
            <form method="POST">

                {% csrf_token %}

                <img src="https://i.pinimg.com/1200x/38/6c/52/386c5283f14bdca0fa14e28dd18fb574.jpg" alt="Work Image"
                    width="30%" height="50%">

                <br><br>
                <label for="username">Username:</label>
                <input type="text" name="username" placeholder="username">

                <label for="email">Email:</label>
                <input type="text" name="email" placeholder="Email">

                <label for="password">Password:</label>
                <input type="password" name="password" placeholder="Password">
                <br><br>
                <button class="btn2">Create Account</button>

            </form>
        </div>
    </div>
