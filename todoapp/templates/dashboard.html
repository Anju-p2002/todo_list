<!DOCTYPE html>
<html>

<head>
    <title>Todo Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f7fb;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar {
            width: 220px;
            background: #fff;
            height: 100vh;
            padding: 20px;
            border-right: 1px solid #ddd;
        }


        .sidebar ul {
            list-style: none;
            padding: 0;
        }

        .sidebar li {
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
        }


        .main {
            flex: 1;
            padding: 30px;
        }

        .cards {
            display: flex;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 200px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .card p {
            font-size: 28px;
            font-weight: bold;
        }

        .tasks {
            margin-top: 30px;
            background: white;
            padding: 20px;
            border-radius: 10px;

        }

        .task {
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-align: space-between;
            padding: 10px;
            border-bottom: 1px solid #cec9c9;
            border-radius: 10px;

        }


        .btn {
            float: right;
            background: #2d4f6c;
            color: white;
            padding: 10px;
            border-radius: 10px;
            border: none;
        }

        .btn1 {
            background: #165899;
            color: rgb(219, 223, 228);
            padding: 10px;
            border-radius: 10px;
            border: none;
            margin-top: 20px;

        }

        .btn3 {
            background-color: #a1c9ed;
            color: #316386;
        }

        .btn4 {
            background-color: #2d4f6c;
            color: #a1c9ed;
        }

        .btn5 {
            float: right;
            background-color: #354049;
            color: #a1c9ed;
        }

        .modal {
            display: none;
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
        }

        .modal-content {
            background: white;
            width: 300px;
            margin: 10% auto;
            padding: 20px;
            border-radius: 10px;
        }

        h2 {
            color: #316386;
        }

        .con {
            float: right;
            color: rgb(12, 11, 11);
            border: none;
        }

        .btn6 {

            background-color: #a7c3db;
            color: black;
            font-size: 16px;
            padding: 15px 32px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            text-align: center;
            display: inline-block;
            width: 150px;

        }



        .btn6:hover {
            background-color: #a7c3db;
            color: white;
        }

        .btn7 {
           background-color: #e4e5ea;
            color: black;
            font-size: 16px;
            padding: 15px 32px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            text-align: center;
            display: inline-block;
            width: 150px;
        }
        .btn7:hover {
            background-color: #a7c3db;
            color: white;
        }

        .btn8 {
            background-color: #e4e5ea;
            color: black;
            font-size: 16px;
            padding: 15px 32px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            text-align: center;
            display: inline-block;
            width: 150px;
        }
        .btn8:hover {
            background-color: #a7c3db;
            color: white;
        }
        .btn9 {
            background-color: #e4e5ea;
            color: black;
            font-size: 16px;
            padding: 15px 32px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            text-align: center;
            display: inline-block;
            width: 150px;
        }
        .btn9:hover {
            background-color: #a7c3db;
            color: white;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="sidebar">

            <h2>ToDo Web</h2>

            <div>
                <ul>
                    <li><a href=""></a></li>
                    <li><a href="{% url 'profile' %}"><button class="btn9">Profile</button></a></li>
                    <li class=""><a href="{% url 'dashboard' %}"><button class="btn6">Overview</button></a></li>
                    <li><a href="{% url 'addtask' %}"><button class="btn7">Tasks</button></a></li>
                    <li><a href="{% url 'calendar' %}"><button class="btn8">Calendar</button></a></li>
                </ul>
            </div>
            <form action="{% url 'logout' %}" method="POST">
                {% csrf_token %}
                <button class="btn1">Logout</button>

            </form>
        </div>

        <div class="main">

            <h1>Welcome back {{ user.username }}!</h1>

            <div class="cards">
                <div class="card">
                    <h3>Active Tasks</h3>
                    <p>{{ active_tasks }}</p>
                </div>

                <div class="card">
                    <h3>Completed Tasks</h3>
                    <p>{{ completed_tasks }}</p>
                </div>

                
            </div>



            <div class="tasks">
                <h2>Upcoming Tasks

                    <a href="{% url 'addtask' %}"><button class="btn">+ New Task</button></a>


                </h2>


                {% for task in tasks %}
                <div class="task">
                    <span>{{ task.title }}</span>
                    <span>{{ task.time }}</time></span>
                    <span>{{ task.due_date }}</span>
                </div>
                <a href="{% url 'updatetask' task.id %}">
                    <button class="btn3">Update</button>
                </a>
                <a href="{% url 'deletetask' task.id %}">
                    <button class="btn4">Delete</button>
                </a>
                <a href="{% url 'completetask' task.id %}">
                    <button class="btn5">Completetask</button>
                </a>

                {% endfor %}
            </div>

        </div>
    </div>

</body>

</html>
