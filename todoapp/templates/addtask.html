<!DOCTYPE html>
<html>

<head>
    <title>Create Task</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f7fb;
        }

        .container {
            display: flex;
        }

        .sidebar {
            width: 220px;
            background: #fff;
            height: 100vh;
            padding: 20px;
        }

        .sidebar li {
            list-style: none;
            padding: 12px;
            margin: 10px 0;
        }

        .sidebar .active {
            background: #a7c3db;
            border-radius: 8px;
        }

        .main {
            flex: 1;
            padding: 30px;
        }

        .form-box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            height: 100%;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .row {
            display: flex;
            gap: 30px;
        }

        .row div {
            flex: 1;
        }

        .priority span {
            padding: 6px 12px;
            border-radius: 10px;
            margin-right: 8px;
        }


        .btn {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            margin-right: 10px;
        }

        .create {
            background: #2d4f6c;
            color: white;
        }

        .cancel {
            background: #e6fffa;
        }

        .box {
            height: 100px;
            padding: auto;
        }
    </style>

</head>

<body>
    <div class="container">

        <div class="sidebar">

            <h2>✔ Todo Web</h2>
            <ul>
                <li class="">Overview</li>
                <li class="active">Tasks</li>
                <li class="">Categories</li>
                <li class="">Calendar</li>
            </ul>
        </div>

        <div class="main">

            <h2>Create New Task</h2>

            <form method="POST" action="" enctype="multipart/form-data">
                {% csrf_token %}

                <label>Task Title</label>
                <input type="text" name="title" placeholder="eg., Q2 Planning">

                <label>Description</label>
                <textarea name="description" class="box" placeholder="Add details..."></textarea>

                <h3>Details</h3>

                <div class="row">

                    <div>
                        <label>Due date</label>
                        <input type="date" name="due_date">
                    </div>

                    <div>
                        <label>Time</label>
                        <input type="time" name="time">
                    </div>

                    <div>
                        <label>Category</label>
                        <select name="category">
                            {% for cat in categories %}
                            <option value="{{ cat.id }}">{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                        <!-- <select name="category">
                            <option value="work" {% if 'task.category==work' %}selected{% endif %}>Work</option>
                            <option value="person" {% if 'task.category==person' %}selected{% endif %}>Person</option>
                            <option value="client" {% if 'task.category==client' %}selected{% endif %}>Client</option>
                            <option value="home" {% if 'task.category==home' %}selected{% endif %}>Home</option>
                            <option value=""> Manage Category...</option> -->



                        </select>
                    </div>

                    <div>
                        <label>Priority</label>
                        <select name="priority">
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>

                </div>

                <button type="submit" class="btn create">Create Task</button>
                <a href="{% url 'dashboard' %}" class="btn cancel">Cancel</a>

            </form>
</body>
