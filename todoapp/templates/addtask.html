<!DOCTYPE html>
<html>
<head>
<title>Create Task</title>

<style>
body {
    font-family: Arial;
    background: #f5f7fb;
}

.container {
    display: flex;
}

.sidebar {
    width: 220px;
    background: #fff;
    height: 100vh;
    padding: 20px;
}

.sidebar li {
    list-style: none;
    padding: 12px;
    margin: 10px 0;
}

.sidebar .active {
    background: #e6fffa;
    border-radius: 8px;
}

.main {
    flex: 1;
    padding: 30px;
}

.form-box {
    background: white;
    padding: 25px;
    border-radius: 12px;
    height:100%;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.row {
    display: flex;
    gap: 30px;
}

.row div {
    flex: 1;
}

.priority span {
    padding: 6px 12px;
    border-radius: 10px;
    margin-right: 8px;
}


.btn {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    margin-right: 10px;
}

.create {
    background: #2d4f6c;
    color: white;
}

.cancel {
    background: #e6fffa;
}
.box{
    height: 100px;
    padding: auto;
}
</style>

</head>
<body>

<div class="container">

<div class="sidebar">
    
    <h2>✔ Todo Web</h2>
    <ul>
        <li class="">Overview</li>
        <li class="">Tasks</li>
        <li class="">Categories</li>
        <li class="">Calendar</li>
    </ul>
</div>

<div class="main">

<h2>Create New Task</h2>

<div class="form-box">

<form method="POST" action="" enctype="multipart/form-data">
{% csrf_token %}

    <label>Task Title</label>
    <input type="text" placeholder="eg.,Q2 Planning">

    <label>Description</label>
    <input type="text" placeholder="Add details..." class="box">


    <h1>Details</h1>

    <div class="row">
    <div>

        <label for="dob">Due date</label>
        <input type="date" id="dob" name="dob">
    </div>

    <div>
        <label>Time</label>
        <input type="time">
    </div>

    <div>
        <label>Category</label>
        <select id="category" name="category">
            <option value="">-- Manage Categories --</option>
            <option value="client">Client</option>
            <option value="Work">Work</option>
            <option value="Personal">Personal</option>
            <option value="Home">Home</option>
        </select>
    </div>
    <div>
        <label>Priority</label>
        <select id="priority" name="priority">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
    </div>
    
</div>

    <button type="submit" class="btn create">Create Task</button>
    <a href="{% url 'dashboard' %}" class="btn cancel">Cancel</a>

</form>

</div>

</div>

</div>
</body>
</html>
