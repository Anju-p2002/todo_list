{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo Web Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(120deg,#eef2f5,#9ca8b1);
}

.container{
    display:flex;
    align-items:center;
    gap:80px;
}

.illustration{
    width:350px;
}


.login-card{
    width:350px;
    background:rgb(178, 217, 238);
    padding:35px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(122, 119, 119, 0.587);
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:20px;
}

.logo h2{
    color:#2d3a4b;
}

.login-card h3{
    margin-bottom:20px;
    color:#333;
}

.input-group{
    margin-bottom:15px;
}

.input-group label{
    font-size:14px;
    color:#555;
}

.input-group input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:6px;
}

.forgot{
    text-align:right;
    font-size:13px;
    margin-bottom:15px;
}

.forgot a{
    text-decoration:none;
    color:#3aa89f;
}

.login-btn{
    width:100%;
    padding:12px;
    border:none;
    background:#1f3a5f;
    color:white;
    border-radius:25px;
    font-size:16px;
    cursor:pointer;
}

.divider{
    text-align:center;
    margin:20px 0;
    color:#888;
}

.social-login{
    display:flex;
    gap:10px;
}

.social-login button{
    flex:1;
    padding:10px;
    border-radius:25px;
    border:1px solid #ccc;
    background:#f7f7f7;
    cursor:pointer;
}

.signup{
    text-align:center;
    margin-top:15px;
    font-size:14px;
}

.signup a{
    color:#1aa39d;
    text-decoration:none;
}
h2{
    color: #1aa39d;
}
</style>
</head>

<body>

<div class="container">

    <div class="illustration">
       
        <img src="{% static 'image/work1.jpg.png' %}" width="300">
    </div>

    <div class="login-card">

        <div class="logo">
            <img src="https://i.pinimg.com/736x/69/d9/4f/69d94fa9277f58352c486fb727377245.jpg" width="25px" height="30px" alt="">
            <h2>Todo
                <br>
                Web
            </h2>
        </div>

        <h3>Log in to your account</h3>

<div class="input-group">
    
<form method="POST">
{% csrf_token %}

<label for="email">Email Address</label>

<input type="text" name="email" placeholder="your.email@example.com">

<label for="password">Password</label>

<input type="password" name="password" placeholder="********">
<br><br>
<div class="forgot">
            <a href="#">Forgot password?</a>
        </div>
 <button class="login-btn">Log In</button>

</form>
</div>
         <div class="divider">-----or log in with------</div>

        <div class="social-login">
            <button>Google</button>
            <button>GitHub</button>
        </div>

        <div class="signup">
            <p>Don't have account? <a href="/signup/">Sign Up</a></p>

        </div>

    </div>

</div>

</body>
</html>
